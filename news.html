<script>
let currentFilter = 'すべて';
let expanded = false;
const LIMIT = 3;

function filter(cat, btn) {
  currentFilter = cat;
  expanded = false;
  document.querySelectorAll('#filters button').forEach(b => {
    b.style.background = '#fff'; b.style.color = '#6a6a6a'; b.style.borderColor = '#dcdcdc';
  });
  btn.style.background = '#161310'; btn.style.color = '#fff'; btn.style.borderColor = '#161310';
  renderList();
}

function showMore() {
  expanded = true;
  renderList();
}

function renderList() {
  const items = Array.from(document.querySelectorAll('.news-item'));
  const filtered = cat => currentFilter === 'すべて' || cat === currentFilter;
  let shown = 0;
  items.forEach(item => {
    const cat = item.dataset.cat;
    if (!filtered(cat)) { item.style.display = 'none'; return; }
    shown++;
    item.style.display = (expanded || shown <= LIMIT) ? 'flex' : 'none';
  });
  const total = items.filter(i => filtered(i.dataset.cat)).length;
  const moreWrap = document.getElementById('more-wrap');
  const moreBtn = document.getElementById('more-btn');
  if (!expanded && total > LIMIT) {
    moreWrap.style.display = 'flex';
    moreBtn.textContent = '+ もっと見る（残り' + (total - LIMIT) + '件）';
  } else {
    moreWrap.style.display = 'none';
  }
}

renderList();
</script>
